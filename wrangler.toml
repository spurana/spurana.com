name = "spurana-com"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

[env.production]
name = "spurana-com-prod"

[env.staging]
name = "spurana-com-staging"

[build]
command = "pnpm build"
cwd = "."

[assets]
directory = "./dist"
binding = "STATIC_ASSETS"

# R2 bucket (create once per account: wrangler r2 bucket create spurana-com-assets)
[[env.production.r2_buckets]]
binding = "ASSETS"
bucket_name = "spurana-com-assets"

[[env.staging.r2_buckets]]
binding = "ASSETS"
bucket_name = "spurana-com-assets"

[env.production.vars]
ENVIRONMENT = "production"
SITE_URL = "https://spurana.com"

[env.staging.vars]
ENVIRONMENT = "staging"
SITE_URL = "https://spurana-com-staging.workers.dev"
